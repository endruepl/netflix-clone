<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Netflix – Registrace</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>

<body class="register-page">
<header class="header">
    <a href="index.html" class="logo"><img src="img/netflix-logo.png" alt="Netflix" class="logo__img"/></a>
    <a href="index.html" class="btn btn--red">Úvodní stránka</a>
</header>

<main class="register-wrapper">
    <form class="register-form" id="registerForm" novalidate>

        <div class="form-group">
            <input class="form-input" type="text" id="firstName" name="firstName" placeholder="Křestní jméno"
                   aria-label="Křestní jméno"/>
        </div>

        <div class="form-group">
            <input class="form-input" type="text" id="lastName" name="lastName" placeholder="Příjmení"
                   aria-label="Příjmení"/>
        </div>

        <div class="form-group">
            <input class="form-input" type="email" id="email" name="email" placeholder="Přihlašovací email"
                   aria-label="Přihlašovací email"/>
        </div>

        <div class="form-group">
            <input class="form-input" type="password" id="password" name="password" placeholder="Vaše heslo"
                   autocomplete="new-password" aria-label="Vaše heslo"/>
        </div>

        <div class="form-group">
            <input class="form-input" type="password" id="passwordConfirm" name="passwordConfirm"
                   placeholder="Heslo znovu" autocomplete="new-password" aria-label="Heslo znovu"/>
            <span class="form-error" id="passwordConfirmError" role="alert"></span>
        </div>

        <button class="btn btn--red btn--full" type="submit">Odeslat</button>

    </form>
</main>

<script src="js/register.js"></script>
</body>
</html>

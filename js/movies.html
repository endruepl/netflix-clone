<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Netflix – Hledání filmů</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>

<body class="movies-page">

<nav class="movies-nav">
    <a href="index.html" class="btn btn--red">Úvodní strana</a>

    <select class="movies-select" id="moviesSelect" aria-label="Vyberte kategorii filmů">
        <option value="" disabled selected>Vyberte možnost</option>
        <option value="girl">Girl</option>
        <option value="boy">Boy</option>
        <option value="love">Love</option>
        <option value="war">War</option>
        <option value="hero">Hero</option>
        <option value="star">Star</option>
        <option value="dark">Dark</option>
        <option value="fire">Fire</option>
    </select>
</nav>

<main class="movies-grid" id="moviesGrid" aria-live="polite"></main>

<script src="js/movies.js"></script>
</body>
</html>
